name: society_ledger
description: Society Management & Ledger System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0
  
  # Navigation
  go_router: ^12.0.0
  
  # HTTP & API
  dio: ^5.3.2
  retrofit: ^4.0.3
  
  # Firebase
  firebase_core: ^2.17.0
  firebase_auth: ^4.10.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^18.0.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.3
  
  # UI Components
  google_fonts: ^6.1.0
  fl_chart: ^0.64.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  
  # Payment
  razorpay_flutter: ^1.3.7
  
  # PDF & Documents
  open_file: ^3.3.2
  path_provider: ^2.1.1
  share_plus: ^10.1.2
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  connectivity_plus: ^5.0.1
  permission_handler: ^11.0.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.9
  table_calendar: ^3.0.9
  timeago: ^3.6.0
  
  # Icons
  cupertino_icons: ^1.0.6
  flutter_iconly: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.3
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/animations/placeholder.json
    - assets/icons/placeholder.png
